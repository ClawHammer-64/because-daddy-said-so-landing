name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect infra changes
        id: infra
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^infra/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        if: steps.infra.outputs.changed == 'true'
        id: tfplan
        working-directory: infra
        run: |
          set +e
          terraform plan -detailed-exitcode
          status=$?
          if [ $status -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $status -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            exit $status
          fi

      - name: Terraform Apply
        if: steps.infra.outputs.changed == 'true' && steps.tfplan.outputs.changes == 'true'
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: tf
        working-directory: infra
        run: |
          echo "bucket=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Sync Site To S3
        run: |
          aws s3 sync ./ s3://${{ steps.tf.outputs.bucket }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "infra/*"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tf.outputs.distribution_id }} --paths "/*"
