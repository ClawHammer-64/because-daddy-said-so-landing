AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for Terraform in because-daddy-said-so-landing

Parameters:
  RoleName:
    Type: String
    Default: terraform-bds-landing-gha
    Description: IAM role name for GitHub Actions
  GitHubOrg:
    Type: String
    Default: ClawHammer-64
    Description: GitHub org/user name
  GitHubRepo:
    Type: String
    Default: because-daddy-said-so-landing
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume this role

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  TerraformRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"

  TerraformPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: terraform-bds-landing
      Roles:
        - !Ref TerraformRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3FullAccess
            Effect: Allow
            Action:
              - s3:*
            Resource: "*"

          - Sid: CloudFront
            Effect: Allow
            Action:
              - cloudfront:CreateDistribution
              - cloudfront:GetDistribution
              - cloudfront:GetDistributionConfig
              - cloudfront:UpdateDistribution
              - cloudfront:DeleteDistribution
              - cloudfront:CreateOriginAccessControl
              - cloudfront:GetOriginAccessControl
              - cloudfront:UpdateOriginAccessControl
              - cloudfront:DeleteOriginAccessControl
              - cloudfront:ListDistributions
              - cloudfront:ListOriginAccessControls
              - cloudfront:ListCachePolicies
              - cloudfront:GetCachePolicy
              - cloudfront:TagResource
              - cloudfront:UntagResource
            Resource: "*"

          - Sid: ACM
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DescribeCertificate
              - acm:ListCertificates
              - acm:DeleteCertificate
              - acm:AddTagsToCertificate
              - acm:RemoveTagsFromCertificate
              - acm:ListTagsForCertificate
            Resource: "*"

          - Sid: Route53
            Effect: Allow
            Action:
              - route53:CreateHostedZone
              - route53:GetHostedZone
              - route53:DeleteHostedZone
              - route53:ListHostedZones
              - route53:ChangeResourceRecordSets
              - route53:ListResourceRecordSets
              - route53:GetChange
              - route53:ListTagsForResource
            Resource: "*"

Outputs:
  TerraformRoleArn:
    Description: IAM role ARN for GitHub Actions
    Value: !GetAtt TerraformRole.Arn
  GitHubOidcProviderArn:
    Description: OIDC provider ARN
    Value: !Ref GitHubOidcProvider
